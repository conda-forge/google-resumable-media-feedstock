{% set name = "google-resumable-media" %}
{% set version = "2.8.0" %}

package:
  name: google-resumable-media
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: f1157ed8b46994d60a1bc432544db62352043113684d4e030ee02e77ebe9a1ae

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - google-crc32c >=1.0.0,<2.0.0
  run_constrained:
    # extras
    - requests >=2.18.0,<3.0.0
    - aiohttp >=3.6.2,<4.0.0
    # omit google-auth because it causes downstream conflicts
    # - google-auth >=1.22.0,<2.0.0

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - google
    - google.resumable_media
  commands:
    - pip check

about:
  home: https://github.com/googleapis/google-resumable-media-python
  summary: Utilities for Google Media Downloads and Resumable Uploads
  doc_url: https://googleapis.github.io/google-resumable-media-python/latest/
  dev_url: https://github.com/googleapis/google-resumable-media-python
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE

extra:
  recipe-maintainers:
    - xylar
    - johanneskoester
    - parthea
    - tswast
